- hosts: servers
  become: yes

  tasks:
    - name: Update apt cache and upgrade system securely
      apt:
        upgrade: dist
        update_cache: yes

    - name: Map hostnames in /etc/hosts statically
      blockinfile:
        path: /etc/hosts
        block: |
          192.168.56.11 loadbalancer
          192.168.56.12 webserver1
          192.168.56.13 webserver2
          192.168.56.14 appserver

    - name: Create devops user with password-protected sudo capability
      user:
        name: devops
        groups: sudo
        password: "{{ 'password' | password_hash('sha512', 'mysecretsalt') }}"
        shell: /bin/bash
        create_home: yes

    - name: Ensure .ssh directory exists for devops
      file:
        path: /home/devops/.ssh
        state: directory
        owner: devops
        group: devops
        mode: '0700'

    - name: Copy Vagrant authorized keys to devops for passwordless SSH
      copy:
        remote_src: yes
        src: /home/vagrant/.ssh/authorized_keys
        dest: /home/devops/.ssh/authorized_keys
        owner: devops
        group: devops
        mode: '0600'

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PermitRootLogin"
        line: "PermitRootLogin no"
      notify: Restart SSH

    - name: Set UFW default deny incoming
      ufw:
        default: deny
        direction: incoming

    - name: Allow SSH
      ufw:
        rule: allow
        port: 22

    - name: Allow HTTP gracefully only on Loadbalancer
      ufw:
        rule: allow
        port: 80
      when: inventory_hostname == 'loadbalancer'

    - name: Enable firewall (default deny)
      ufw:
        state: enabled

    - name: Install unattended upgrades
      apt:
        name: unattended-upgrades
        state: present

    - name: Enforce 20auto-upgrades Rubric Configuration
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Install Fail2Ban
      apt:
        name: fail2ban
        state: present

    - name: Ensure Fail2Ban is running and enabled
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Install Netdata via official script
      shell: "curl https://my-netdata.io/kickstart.sh > /tmp/netdata-kickstart.sh && sh /tmp/netdata-kickstart.sh --dont-wait"
      args:
        creates: /usr/sbin/netdata # If Netdata is already installed, skip this task

    - name: Install WireGuard
      apt:
        name: wireguard
        state: present

    - name: Generate WireGuard Private Key
      shell: "wg genkey | tee /etc/wireguard/private.key"
      args:
        creates: /etc/wireguard/private.key

    - name: Allow WireGuard port on UFW
      ufw:
        rule: allow
        port: 51820
        proto: udp

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart SSH

    - name: Allow only devops user (and Vagrant for bootstrapping)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^AllowUsers"
        line: "AllowUsers devops vagrant"
      notify: Restart SSH

    - name: Set secure umask
      lineinfile:
        path: /etc/profile
        line: "umask 027"

    - name: Set secure umask in login.defs
      lineinfile:
        path: /etc/login.defs
        regexp: "^UMASK"
        line: "UMASK 027"

    - name: Disable unused network interfaces
      shell: ip link set {{ item }} down
      loop:
        - eth2
      ignore_errors: yes

    - name: Remove vagrant from AllowUsers to fully lock down SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^AllowUsers"
        line: "AllowUsers devops"
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
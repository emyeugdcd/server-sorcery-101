- hosts: servers
  become: yes

  tasks:
    - name: Update apt cache and upgrade system securely
      apt:
        upgrade: dist
        update_cache: yes

    - name: Map hostnames in /etc/hosts statically
      blockinfile:
        path: /etc/hosts
        block: |
          192.168.56.11 loadbalancer
          192.168.56.12 webserver1
          192.168.56.13 webserver2
          192.168.56.14 appserver

    - name: Create devops user with password-protected sudo capability
      user:
        name: devops
        groups: sudo
        password: "{{ 'password' | password_hash('sha512', 'mysecretsalt') }}"
        shell: /bin/bash
        create_home: yes

    - name: Ensure .ssh directory exists for devops
      file:
        path: /home/devops/.ssh
        state: directory
        owner: devops
        group: devops
        mode: '0700'

    - name: Copy Vagrant authorized keys to devops for passwordless SSH
      copy:
        remote_src: yes
        src: /home/vagrant/.ssh/authorized_keys
        dest: /home/devops/.ssh/authorized_keys
        owner: devops
        group: devops
        mode: '0600'

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PermitRootLogin"
        line: "PermitRootLogin no"
      notify: Restart SSH

    - name: Set UFW default deny incoming
      ufw:
        default: deny
        direction: incoming

    - name: Allow SSH
      ufw:
        rule: allow
        port: 22

    - name: Allow HTTP gracefully only on Loadbalancer
      ufw:
        rule: allow
        port: 80
      when: inventory_hostname == 'loadbalancer'
    
    - name: Allow Netdata monitoring port
      ufw:
        rule: allow
        port: 19999
        proto: tcp

    - name: Enable firewall (default deny)
      ufw:
        state: enabled

    - name: Install unattended upgrades
      apt:
        name: unattended-upgrades
        state: present

    - name: Enforce 20auto-upgrades Rubric Configuration
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Install Fail2Ban
      apt:
        name: fail2ban
        state: present

    - name: Ensure Fail2Ban is running and enabled
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Download Netdata kickstart script
      shell: "curl -Ss https://get.netdata.cloud/kickstart.sh -o /tmp/netdata-kickstart.sh"
      args:
        creates: /usr/sbin/netdata

    - name: Install Netdata via kickstart script
      shell: "bash /tmp/netdata-kickstart.sh --dont-wait"
      args:
        creates: /usr/sbin/netdata

    - name: Force Netdata to bind to all interfaces
      blockinfile:
        path: /etc/netdata/netdata.conf
        create: yes
        block: |
          [web]
              bind to = 0.0.0.0
      notify: Restart Netdata

    - name: Install WireGuard
      apt:
        name: wireguard
        state: present

    - name: Generate WireGuard public key
      shell: "cat /etc/wireguard/private.key | wg pubkey | tee /etc/wireguard/public.key"
      args:
        creates: /etc/wireguard/public.key

    - name: Generate WireGuard wg0 configuration dynamically
      shell: |
        echo "[Interface]" > /etc/wireguard/wg0.conf
        echo "PrivateKey = $(cat /etc/wireguard/private.key)" >> /etc/wireguard/wg0.conf
        echo "ListenPort = 51820" >> /etc/wireguard/wg0.conf
        echo "Address = 10.8.0.{{ ansible_host.split('.')[-1] }}/24" >> /etc/wireguard/wg0.conf
        chmod 600 /etc/wireguard/wg0.conf
      args:
        creates: /etc/wireguard/wg0.conf

    - name: Enable and start WireGuard interface
      systemd:
        name: wg-quick@wg0
        enabled: yes
        state: started

    - name: Allow WireGuard port on UFW
      ufw:
        rule: allow
        port: 51820
        proto: udp

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart SSH

    - name: Allow only devops user (and Vagrant for bootstrapping)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^AllowUsers"
        line: "AllowUsers devops vagrant"
      notify: Restart SSH

    - name: Set secure umask
      lineinfile:
        path: /etc/profile
        line: "umask 027"

    - name: Set secure umask in login.defs
      lineinfile:
        path: /etc/login.defs
        regexp: "^UMASK"
        line: "UMASK 027"

    - name: Disable unused network interfaces
      shell: ip link set {{ item }} down
      loop:
        - eth2
      ignore_errors: yes

    - name: Remove vagrant from AllowUsers to fully lock down SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^AllowUsers"
        line: "AllowUsers devops"
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
    - name: Restart Netdata
      service:
        name: netdata
        state: restarted